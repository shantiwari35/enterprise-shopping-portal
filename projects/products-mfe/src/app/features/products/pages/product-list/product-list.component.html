<div class="container">
  <header class="header">
    <h1>Products Remote</h1>
    <p>Explore our curated collection of premium products.</p>
  </header>

  <div class="product-grid">

    <lib-product-card
    *ngFor="let product of products;"
     [product]="product"
     (addToCart)="addProductToCart($event)"
     ></lib-product-card>
  </div>
</div>
